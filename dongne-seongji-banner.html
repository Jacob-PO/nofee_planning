<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동네성지 배너</title>
    <link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SUIT Variable', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .banner-container {
            width: 2462px;
            height: 1326px;
            position: relative;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .banner-container:hover {
            transform: scale(1.02);
        }

        /* 왼쪽 상단 원형 장식 */
        .circle-decoration-left {
            position: absolute;
            left: 80px;
            top: 80px;
            width: 450px;
            height: 450px;
            border: 3px solid rgba(173, 216, 230, 0.4);
            border-radius: 50%;
        }

        /* 오른쪽 하단 원형 장식 */
        .circle-decoration-right {
            position: absolute;
            right: 80px;
            bottom: 80px;
            width: 450px;
            height: 450px;
            border: 3px solid rgba(173, 216, 230, 0.4);
            border-radius: 50%;
        }

        /* 왼쪽 하단 도트 패턴 */
        .dots-left {
            position: absolute;
            left: 150px;
            bottom: 180px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 18px;
        }

        .dot-left {
            width: 12px;
            height: 12px;
            background: rgba(144, 238, 144, 0.6);
            border-radius: 50%;
        }

        /* 오른쪽 상단 도트 패턴 */
        .dots-right {
            position: absolute;
            right: 150px;
            top: 100px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 18px;
        }

        .dot-right {
            width: 12px;
            height: 12px;
            background: rgba(173, 216, 230, 0.6);
            border-radius: 50%;
        }

        /* 메인 텍스트 영역 */
        .text-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .badge {
            display: inline-block;
            background: #f1f3f5;
            color: #495057;
            padding: 16px 40px;
            border-radius: 100px;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        .main-text {
            font-size: 220px;
            font-weight: 900;
            color: #1a1a1a;
            line-height: 1.2;
            letter-spacing: -4px;
            margin-bottom: 20px;
        }

        .gradient-text {
            font-size: 240px;
            font-weight: 900;
            background: linear-gradient(135deg, #4A90E2 0%, #50C9C3 50%, #47D6D6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            letter-spacing: -4px;
            margin: 20px 0;
        }

        .sub-text {
            font-size: 220px;
            font-weight: 900;
            color: #1a1a1a;
            line-height: 1.2;
            letter-spacing: -4px;
        }

        /* 모바일 반응형 */
        @media (max-width: 1200px) {
            .banner-container {
                width: 100%;
                height: auto;
                aspect-ratio: 2462 / 1326;
            }

            .circle-decoration-left,
            .circle-decoration-right {
                width: 18%;
                height: auto;
                aspect-ratio: 1;
            }

            .circle-decoration-left {
                left: 3%;
                top: 6%;
            }

            .circle-decoration-right {
                right: 3%;
                bottom: 6%;
            }

            .dots-left {
                left: 6%;
                bottom: 13%;
                gap: 0.7vw;
            }

            .dot-left {
                width: 0.5vw;
                height: 0.5vw;
            }

            .dots-right {
                right: 6%;
                top: 7%;
                gap: 0.7vw;
            }

            .dot-right {
                width: 0.5vw;
                height: 0.5vw;
            }

            .badge {
                font-size: 1.7vw;
                padding: 0.6vw 1.6vw;
                margin-bottom: 2.4vw;
            }

            .main-text {
                font-size: 8.9vw;
            }

            .gradient-text {
                font-size: 9.7vw;
                margin: 0.8vw 0;
            }

            .sub-text {
                font-size: 8.9vw;
            }
        }
    </style>
</head>
<body>
    <a href="https://jacob-po.github.io/nofee_planning/2025-10-13_동네성지_랜딩페이지_v1.0.html" target="_blank" style="text-decoration: none;">
        <div class="banner-container">
            <!-- 왼쪽 상단 원형 -->
            <div class="circle-decoration-left"></div>

            <!-- 오른쪽 하단 원형 -->
            <div class="circle-decoration-right"></div>

            <!-- 왼쪽 하단 도트 -->
            <div class="dots-left">
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
                <div class="dot-left"></div>
            </div>

            <!-- 오른쪽 상단 도트 -->
            <div class="dots-right">
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
                <div class="dot-right"></div>
            </div>

            <!-- 메인 텍스트 -->
            <div class="text-content">
                <div class="badge">동네성지 신기능 오픈</div>
                <div class="main-text">집 근처</div>
                <div class="gradient-text">휴대폰 성지를</div>
                <div class="sub-text">찾아드려요</div>
            </div>
        </div>
    </a>
</body>
</html>
